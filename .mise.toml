[tools]
# Keep in sync with rust-toolchain.toml (the canonical pin).
rust = "1.96.0"
# Pin nushell as the default shell — sourced from GitHub releases via aqua
"aqua:nushell/nushell" = "latest"

# cargo-deny installed manually (not through mise)

[settings]
# Use nushell as the default shell for tasks (inline + shebang-less file tasks)
unix_default_inline_shell_args = "nu -c"
unix_default_file_shell_args = "nu"

[env]
RUSTFLAGS = "-D warnings"
CARGO_REGISTRIES_CRATES_IO_PROTOCOL = "sparse"

[tasks.check-all]
run = "./.mise/tasks/check-all"

[tasks.test]
run = "./.mise/tasks/test"

[tasks.lint]
run = "./.mise/tasks/lint"

[tasks.fix]
run = "./.mise/tasks/fix"
